# =============================================================
# AssetGuardian Backend — Application Configuration
# All secrets are loaded from environment variables.
# Never commit real values to source control.
# =============================================================

# --- Server ---
server.port=${PORT:8080}

# --- PostgreSQL DataSource ---
# Set these env vars in Render / Railway / Fly.io / etc.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000

# --- CORS (allow deployed frontend to call this API) ---
# Set ALLOWED_ORIGINS to your Vercel / Netlify / GitHub Pages URL
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173}

# --- Multipart uploads (for watermarking endpoint) ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- AI Service URL ---
# Point to your deployed Python AI service
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# --- Logging ---
logging.level.root=WARN
logging.level.com.assetguardian=INFO
